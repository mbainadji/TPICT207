# Azure Managed Identity settings for MySQL
# Set this to the name of your managed identity (object id / client id) used for Azure MySQL authentication.
azure.mysql.managed-identity=YOUR_MANAGED_IDENTITY_NAME

# Azure Database for MySQL connection settings
# Replace with your Azure MySQL server hostname (e.g. myserver.mysql.database.azure.com) and database name.
azure.mysql.host=localhost
azure.mysql.port=3306
azure.mysql.database=notes_db
azure.mysql.use-ssl=false
azure.mysql.server-timezone=UTC

# Optional: supply a full JDBC connection URL instead of individual properties.
# If set, this URL will be used directly (plugin/user params appended if missing).
# azure.mysql.jdbc-url=jdbc:mysql://<host>:<port>/<database>

# Local / non-Azure MySQL credentials (optional)
# Set these when using a local MySQL instance without managed identity.
azure.mysql.user=root
azure.mysql.password=kamala237
