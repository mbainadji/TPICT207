# MySQL profile: store all data in a MySQL database.
#
# Usage:
# - Run with: --spring.profiles.active=mysql
# - Or set env: SPRING_PROFILES_ACTIVE=mysql
#
# Defaults below are for local MySQL. Adjust host/user/password for your environment.

spring.datasource.url=jdbc:mysql://localhost:3306/notes_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=app
spring.datasource.password=app123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# Seed demo accounts/data in MySQL (idempotent). Remove if you don't want demo data in prod.
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-mysql.sql

