# MySQL profile: store all data in a MySQL database.
#
# Usage:
# - Run with: --spring.profiles.active=mysql
# - Or set env: SPRING_PROFILES_ACTIVE=mysql
#
# Defaults below are for local MySQL. Adjust host/user/password for your environment.

spring.datasource.url=jdbc:mysql://localhost:3306/notes_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=tpict_user
spring.datasource.password=tpict_pass

# Use schema-mysql.sql to create tables; Hibernate shouldn't try to manage schema in this profile.
spring.jpa.hibernate.ddl-auto=none
# The local DB client is MariaDB; forcing the dialect avoids Hibernate probing INFORMATION_SCHEMA.KEYWORDS
# (which differs between MySQL/MariaDB versions).
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql
# Seed demo accounts/data in MySQL (idempotent). Remove if you don't want demo data in prod.
spring.sql.init.data-locations=classpath:data-mysql.sql
