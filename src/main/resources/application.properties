#
# Local runtime defaults (web app)
#
# We default to an in-memory H2 database so the web UI starts immediately without extra setup.
# For MySQL/Azure settings, see the "Azure / MySQL" section below.
spring.application.name=grade-validation
server.port=8081

# Default profile (local): persistent file-based H2.
# To store data in MySQL, run with: --spring.profiles.active=mysql
spring.datasource.url=jdbc:h2:file:${user.home}/.grade-validation/notes_db;MODE=MySQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
# Initialize demo data for local H2 (idempotent MERGE statements).
spring.sql.init.mode=always

# Keep dev tools disabled by default for a "dashboard-first" experience.
spring.h2.console.enabled=false

#
# Azure / MySQL (optional)
#
# Azure Managed Identity settings for MySQL
# Set this to the name of your managed identity (object id / client id) used for Azure MySQL authentication.
azure.mysql.managed-identity=YOUR_MANAGED_IDENTITY_NAME

# Azure Database for MySQL connection settings
# Replace with your Azure MySQL server hostname (e.g. myserver.mysql.database.azure.com) and database name.
azure.mysql.host=localhost
azure.mysql.port=3306
azure.mysql.database=notes_db
azure.mysql.use-ssl=false
azure.mysql.server-timezone=UTC

# Optional: supply a full JDBC connection URL instead of individual properties.
# If set, this URL will be used directly (plugin/user params appended if missing).
# azure.mysql.jdbc-url=jdbc:mysql://<host>:<port>/<database>

# Local / non-Azure MySQL credentials (optional)
# Set these when using a local MySQL instance without managed identity.
azure.mysql.user=app
azure.mysql.password=app123
